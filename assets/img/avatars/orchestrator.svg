<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#555"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Head -->
  <circle cx="100" cy="82" r="42" fill="#D8C4A8"/>
  <!-- Silver-templed hair -->
  <path d="M60,72 Q65,45 100,40 Q135,45 140,72" fill="#2a2a2a"/>
  <path d="M60,72 Q62,55 70,50" fill="none" stroke="#C0C0C0" stroke-width="4" opacity="0.8"/>
  <path d="M140,72 Q138,55 130,50" fill="none" stroke="#C0C0C0" stroke-width="4" opacity="0.8"/>
  <!-- Distinguished face - no animal features -->
  <!-- Eyes - sharp, authoritative -->
  <ellipse cx="85" cy="82" rx="7" ry="5" fill="white"/>
  <ellipse cx="115" cy="82" rx="7" ry="5" fill="white"/>
  <circle cx="86" cy="82" r="3.5" fill="#333"/>
  <circle cx="116" cy="82" r="3.5" fill="#333"/>
  <circle cx="87" cy="81" r="1.2" fill="white"/>
  <circle cx="117" cy="81" r="1.2" fill="white"/>
  <!-- Sharp eyebrows -->
  <line x1="75" y1="74" x2="93" y2="76" stroke="#2a2a2a" stroke-width="2.5"/>
  <line x1="125" y1="74" x2="107" y2="76" stroke="#2a2a2a" stroke-width="2.5"/>
  <!-- Nose -->
  <path d="M97,86 L100,94 L103,86" fill="none" stroke="#b8a08a" stroke-width="1.5"/>
  <!-- Composed expression -->
  <path d="M90,100 Q100,106 110,100" fill="none" stroke="#8a7060" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Graphite suit -->
  <path d="M50,135 Q70,118 100,122 Q130,118 150,135 L160,200 L40,200 Z" fill="#3a3a3a"/>
  <!-- White shirt collar -->
  <path d="M82,122 L92,140 L100,128 L108,140 L118,122" fill="white" stroke="#ddd" stroke-width="0.5"/>
  <!-- Conductor's baton -->
  <line x1="145" y1="110" x2="170" y2="60" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="170" cy="58" r="3" fill="white"/>
  <!-- Baton hand -->
  <circle cx="145" cy="112" r="8" fill="#D8C4A8"/>
  <!-- Subtle label -->
  <text x="100" y="188" text-anchor="middle" font-family="Georgia, serif" font-size="12" fill="#C0C0C0" font-weight="bold" opacity="0.4">ORCHESTRATOR</text>
</svg>