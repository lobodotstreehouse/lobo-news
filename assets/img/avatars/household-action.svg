<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#CD8C6E"/>
      <stop offset="100%" style="stop-color:#8FBC6E"/>
    </linearGradient>
  </defs>
  <!-- Background - warm terracotta to houseplant green -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Rabbit ears - tall, soft -->
  <ellipse cx="75" cy="22" rx="12" ry="32" fill="#E8D5C0" stroke="#CD8C6E" stroke-width="1.5"/>
  <ellipse cx="125" cy="22" rx="12" ry="32" fill="#E8D5C0" stroke="#CD8C6E" stroke-width="1.5"/>
  <!-- Inner ear pink -->
  <ellipse cx="75" cy="20" rx="7" ry="22" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="125" cy="20" rx="7" ry="22" fill="#FFB6C1" opacity="0.5"/>
  <!-- Head - warm, round -->
  <circle cx="100" cy="85" r="45" fill="#F5E0CC"/>
  <!-- Soft wavy hair -->
  <path d="M58,78 Q65,42 100,38 Q135,42 142,78" fill="#8B6045"/>
  <path d="M65,50 Q70,42 78,48" fill="#8B6045"/>
  <path d="M122,48 Q130,42 135,50" fill="#8B6045"/>
  <!-- Warm, kind eyes -->
  <ellipse cx="82" cy="84" rx="8" ry="7" fill="white"/>
  <ellipse cx="118" cy="84" rx="8" ry="7" fill="white"/>
  <circle cx="83" cy="85" r="4.5" fill="#6B4226"/>
  <circle cx="119" cy="85" r="4.5" fill="#6B4226"/>
  <circle cx="84" cy="83" r="1.8" fill="white"/>
  <circle cx="120" cy="83" r="1.8" fill="white"/>
  <!-- Soft friendly brows -->
  <path d="M72,76 Q82,72 92,76" fill="none" stroke="#8B6045" stroke-width="1.5"/>
  <path d="M108,76 Q118,72 128,76" fill="none" stroke="#8B6045" stroke-width="1.5"/>
  <!-- Round nose -->
  <circle cx="100" cy="94" r="3.5" fill="#E8B89D"/>
  <!-- Warm smile -->
  <path d="M86,105 Q100,116 114,105" fill="none" stroke="#8B6045" stroke-width="2" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="70" cy="98" r="8" fill="#FFB6C1" opacity="0.3"/>
  <circle cx="130" cy="98" r="8" fill="#FFB6C1" opacity="0.3"/>
  <!-- Comfortable sweater -->
  <path d="M50,135 Q72,118 100,122 Q128,118 150,135 L158,200 L42,200 Z" fill="#F5F0E0"/>
  <!-- Sweater texture -->
  <path d="M65,150 Q80,145 95,150 Q110,145 125,150 Q140,145 150,150" fill="none" stroke="#E8D5C0" stroke-width="1"/>
  <path d="M60,165 Q75,160 90,165 Q105,160 120,165 Q135,160 150,165" fill="none" stroke="#E8D5C0" stroke-width="1"/>
  <!-- Cup of something hot -->
  <path d="M42,150 L38,175 Q38,180 42,180 L58,180 Q62,180 62,175 L58,150 Z" fill="#CD8C6E" stroke="#8B6045" stroke-width="1"/>
  <!-- Steam -->
  <path d="M45,148 Q43,140 46,135" fill="none" stroke="white" stroke-width="1" opacity="0.5"/>
  <path d="M50,146 Q48,138 51,132" fill="none" stroke="white" stroke-width="1" opacity="0.4"/>
  <path d="M55,148 Q53,140 56,135" fill="none" stroke="white" stroke-width="1" opacity="0.3"/>
  <!-- Handle -->
  <path d="M62,158 Q70,158 70,165 Q70,172 62,172" fill="none" stroke="#8B6045" stroke-width="2"/>
  <!-- Small houseplant accent -->
  <circle cx="160" cy="175" r="10" fill="#6B8E23" opacity="0.4"/>
  <line x1="160" y1="185" x2="160" y2="195" stroke="#8B6045" stroke-width="2"/>
  <rect x="155" y="193" width="10" height="7" rx="1" fill="#CD8C6E"/>
</svg>