<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#1a2a4a"/>
    </linearGradient>
  </defs>
  <!-- Background - deep navy -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Pointed owl-like ears -->
  <polygon points="60,38 48,8 75,35" fill="#0a1628" stroke="#FFFDD0" stroke-width="1"/>
  <polygon points="140,38 152,8 125,35" fill="#0a1628" stroke="#FFFDD0" stroke-width="1"/>
  <polygon points="62,36 52,15 72,35" fill="#FFFDD0" opacity="0.2"/>
  <polygon points="138,36 148,15 128,35" fill="#FFFDD0" opacity="0.2"/>
  <!-- Head - slightly lean, hunched forward -->
  <ellipse cx="100" cy="85" rx="42" ry="44" fill="#E8D5B7"/>
  <!-- Thinning scholarly hair -->
  <path d="M60,75 Q68,42 100,38 Q132,42 140,75" fill="#4a3a2a"/>
  <!-- Large owl eyes -->
  <circle cx="82" cy="82" r="12" fill="white" stroke="#4a3a2a" stroke-width="1.5"/>
  <circle cx="118" cy="82" r="12" fill="white" stroke="#4a3a2a" stroke-width="1.5"/>
  <circle cx="83" cy="83" r="6" fill="#1a2a4a"/>
  <circle cx="119" cy="83" r="6" fill="#1a2a4a"/>
  <circle cx="85" cy="81" r="2" fill="white"/>
  <circle cx="121" cy="81" r="2" fill="white"/>
  <!-- Reading glasses -->
  <circle cx="82" cy="82" r="14" fill="none" stroke="#B8860B" stroke-width="2"/>
  <circle cx="118" cy="82" r="14" fill="none" stroke="#B8860B" stroke-width="2"/>
  <line x1="96" y1="82" x2="104" y2="82" stroke="#B8860B" stroke-width="2"/>
  <line x1="68" y1="80" x2="58" y2="76" stroke="#B8860B" stroke-width="1.5"/>
  <line x1="132" y1="80" x2="142" y2="76" stroke="#B8860B" stroke-width="1.5"/>
  <!-- Thin thoughtful eyebrows -->
  <path d="M70,68 Q80,64 94,68" fill="none" stroke="#4a3a2a" stroke-width="1.5"/>
  <path d="M106,68 Q120,64 130,68" fill="none" stroke="#4a3a2a" stroke-width="1.5"/>
  <!-- Nose -->
  <path d="M97,90 L100,97 L103,90" fill="none" stroke="#c0a080" stroke-width="1.2"/>
  <!-- Thin contemplative lips -->
  <path d="M92,105 Q100,109 108,105" fill="none" stroke="#8a7060" stroke-width="1.2"/>
  <!-- Cream cardigan -->
  <path d="M52,135 Q72,118 100,122 Q128,118 148,135 L158,200 L42,200 Z" fill="#FFFDD0"/>
  <line x1="100" y1="122" x2="100" y2="200" stroke="#D2B48C" stroke-width="1"/>
  <!-- Long fingers holding something -->
  <path d="M55,145 L50,140 L45,142 L42,148 L48,150" fill="none" stroke="#E8D5B7" stroke-width="3" stroke-linecap="round"/>
  <!-- Highlighted text yellow accent -->
  <rect x="40" y="150" width="25" height="5" rx="1" fill="#FFE44D" opacity="0.6"/>
  <rect x="40" y="158" width="20" height="5" rx="1" fill="#FFE44D" opacity="0.4"/>
  <rect x="40" y="166" width="22" height="5" rx="1" fill="#FFE44D" opacity="0.5"/>
</svg>