<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a3a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background - industrial grey to matte black -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Mole features - small rounded ears -->
  <ellipse cx="62" cy="42" rx="10" ry="12" fill="#555" stroke="#444" stroke-width="1"/>
  <ellipse cx="138" cy="42" rx="10" ry="12" fill="#555" stroke="#444" stroke-width="1"/>
  <ellipse cx="62" cy="41" rx="6" ry="7" fill="#D2691E" opacity="0.3"/>
  <ellipse cx="138" cy="41" rx="6" ry="7" fill="#D2691E" opacity="0.3"/>
  <!-- Head - compact, solid -->
  <circle cx="100" cy="82" r="42" fill="#C4A070"/>
  <!-- Short cropped hair -->
  <path d="M60,74 Q68,44 100,40 Q132,44 140,74" fill="#3a2a1a"/>
  <!-- Mole-like small squinting eyes -->
  <ellipse cx="84" cy="82" rx="5" ry="3.5" fill="#111"/>
  <circle cx="84" cy="82" r="2" fill="#D2691E"/>
  <ellipse cx="116" cy="82" rx="5" ry="3.5" fill="#111"/>
  <circle cx="116" cy="82" r="2" fill="#D2691E"/>
  <circle cx="85" cy="81" r="0.8" fill="white"/>
  <circle cx="117" cy="81" r="0.8" fill="white"/>
  <!-- Practical squinting brows -->
  <line x1="76" y1="76" x2="92" y2="78" stroke="#3a2a1a" stroke-width="2.5"/>
  <line x1="124" y1="76" x2="108" y2="78" stroke="#3a2a1a" stroke-width="2.5"/>
  <!-- Broad working nose -->
  <path d="M96,87 L100,95 L104,87" fill="none" stroke="#a08060" stroke-width="1.5"/>
  <!-- Determined set mouth -->
  <line x1="90" y1="103" x2="110" y2="103" stroke="#6a5040" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Work jacket -->
  <path d="M50,130 Q72,115 100,118 Q128,115 150,130 L158,200 L42,200 Z" fill="#2a2a2a"/>
  <!-- Deep orange details -->
  <line x1="70" y1="145" x2="70" y2="200" stroke="#D2691E" stroke-width="2"/>
  <line x1="130" y1="145" x2="130" y2="200" stroke="#D2691E" stroke-width="2"/>
  <!-- Chest pockets -->
  <rect x="65" y="145" width="18" height="14" rx="2" fill="none" stroke="#D2691E" stroke-width="1"/>
  <rect x="117" y="145" width="18" height="14" rx="2" fill="none" stroke="#D2691E" stroke-width="1"/>
  <!-- Multi-tool -->
  <rect x="140" y="130" width="8" height="22" rx="2" fill="#777" stroke="#D2691E" stroke-width="0.5"/>
  <!-- Tool blades -->
  <line x1="144" y1="128" x2="144" y2="122" stroke="#aaa" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="146" y1="128" x2="150" y2="120" stroke="#aaa" stroke-width="1" stroke-linecap="round"/>
  <!-- Hand -->
  <circle cx="144" cy="128" r="7" fill="#C4A070"/>
  <!-- Work boots hint -->
  <rect x="80" y="192" width="16" height="8" rx="3" fill="#4a3a1a" stroke="#D2691E" stroke-width="0.5"/>
  <rect x="104" y="192" width="16" height="8" rx="3" fill="#4a3a1a" stroke="#D2691E" stroke-width="0.5"/>
</svg>