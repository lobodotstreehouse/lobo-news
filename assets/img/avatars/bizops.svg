<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a2a"/>
      <stop offset="100%" style="stop-color:#006D6F"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Fox ears - sleek -->
  <polygon points="62,32 48,4 78,28" fill="#B8860B" stroke="#8B6914" stroke-width="1"/>
  <polygon points="138,32 152,4 122,28" fill="#B8860B" stroke="#8B6914" stroke-width="1"/>
  <polygon points="63,30 52,10 74,28" fill="#FFD700" opacity="0.3"/>
  <polygon points="137,30 148,10 126,28" fill="#FFD700" opacity="0.3"/>
  <!-- Head -->
  <circle cx="100" cy="82" r="42" fill="#D8B896"/>
  <!-- Slicked-back hair -->
  <path d="M60,72 Q68,42 100,38 Q132,42 140,72" fill="#2a1a0a"/>
  <!-- Sharp confident eyes -->
  <ellipse cx="84" cy="82" rx="7" ry="5.5" fill="white"/>
  <ellipse cx="116" cy="82" rx="7" ry="5.5" fill="white"/>
  <circle cx="85" cy="82" r="3.5" fill="#006D6F"/>
  <circle cx="117" cy="82" r="3.5" fill="#006D6F"/>
  <circle cx="86" cy="81" r="1.2" fill="white"/>
  <circle cx="118" cy="81" r="1.2" fill="white"/>
  <!-- Confident arched brows -->
  <path d="M74,74 Q84,70 93,75" fill="none" stroke="#2a1a0a" stroke-width="2"/>
  <path d="M107,75 Q116,70 126,74" fill="none" stroke="#2a1a0a" stroke-width="2"/>
  <!-- Nose -->
  <path d="M97,87 L100,94 L103,87" fill="none" stroke="#b09070" stroke-width="1.3"/>
  <!-- Confident smile -->
  <path d="M87,101 Q100,110 113,101" fill="none" stroke="#7a6050" stroke-width="1.5"/>
  <!-- Slim suit - no tie -->
  <path d="M50,132 Q70,115 100,118 Q130,115 150,132 L158,200 L42,200 Z" fill="#333"/>
  <!-- Shirt collar open -->
  <path d="M85,118 L90,132 L100,122 L110,132 L115,118" fill="white"/>
  <!-- Pocket square - gold -->
  <polygon points="135,140 140,135 145,140 140,148" fill="#FFD700"/>
  <!-- Tablet with CRM pipeline -->
  <rect x="42" y="142" width="28" height="38" rx="3" fill="#111" stroke="#006D6F" stroke-width="1"/>
  <!-- Pipeline bars on tablet -->
  <rect x="46" y="148" width="5" height="12" fill="#FFD700" opacity="0.8"/>
  <rect x="53" y="152" width="5" height="8" fill="#006D6F" opacity="0.8"/>
  <rect x="60" y="146" width="5" height="14" fill="#FFD700" opacity="0.6"/>
  <rect x="46" y="164" width="18" height="2" rx="1" fill="#006D6F" opacity="0.4"/>
  <rect x="46" y="168" width="14" height="2" rx="1" fill="#FFD700" opacity="0.3"/>
  <!-- Hand holding tablet -->
  <circle cx="56" cy="140" r="8" fill="#D8B896"/>
</svg>