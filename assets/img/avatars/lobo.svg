<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#191970"/>
      <stop offset="100%" style="stop-color:#8B4513"/>
    </linearGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="95"/>
    </clipPath>
  </defs>
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Wolf ears -->
  <polygon points="55,30 40,5 70,35" fill="#8B4513" stroke="#191970" stroke-width="2"/>
  <polygon points="145,30 160,5 130,35" fill="#8B4513" stroke="#191970" stroke-width="2"/>
  <polygon points="57,30 45,12 68,35" fill="#DAA520" opacity="0.5"/>
  <polygon points="143,30 155,12 132,35" fill="#DAA520" opacity="0.5"/>
  <!-- Head shape -->
  <circle cx="100" cy="90" r="50" fill="#D2A679"/>
  <!-- Dark hair -->
  <ellipse cx="100" cy="70" rx="48" ry="30" fill="#1a1a2e"/>
  <path d="M55,75 Q60,50 100,45 Q140,50 145,75" fill="#1a1a2e"/>
  <!-- Eyes - slightly amused -->
  <ellipse cx="82" cy="90" rx="8" ry="6" fill="white"/>
  <ellipse cx="118" cy="90" rx="8" ry="6" fill="white"/>
  <circle cx="84" cy="89" r="4" fill="#191970"/>
  <circle cx="120" cy="89" r="4" fill="#191970"/>
  <circle cx="85" cy="88" r="1.5" fill="white"/>
  <circle cx="121" cy="88" r="1.5" fill="white"/>
  <!-- Amused eyebrows -->
  <path d="M72,82 Q82,77 92,82" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <path d="M108,82 Q118,77 128,82" fill="none" stroke="#1a1a2e" stroke-width="2"/>
  <!-- Slight smirk -->
  <path d="M85,105 Q100,115 115,103" fill="none" stroke="#5a3a2a" stroke-width="2" stroke-linecap="round"/>
  <!-- Nose -->
  <path d="M97,95 L100,100 L103,95" fill="none" stroke="#b8856e" stroke-width="1.5"/>
  <!-- Leather jacket collar -->
  <path d="M50,140 Q55,125 75,120 L85,135 L75,155" fill="#5a3a1a" stroke="#3a2510" stroke-width="1"/>
  <path d="M150,140 Q145,125 125,120 L115,135 L125,155" fill="#5a3a1a" stroke="#3a2510" stroke-width="1"/>
  <!-- Jacket body -->
  <path d="M50,140 L40,200 L160,200 L150,140 Q130,125 100,130 Q70,125 50,140" fill="#6b4423" stroke="#3a2510" stroke-width="1"/>
  <!-- Jacket zipper -->
  <line x1="100" y1="130" x2="100" y2="200" stroke="#DAA520" stroke-width="2"/>
  <!-- Phone in hand -->
  <rect x="140" y="155" width="18" height="30" rx="3" fill="#222" stroke="#DAA520" stroke-width="1"/>
  <rect x="142" y="158" width="14" height="22" rx="1" fill="#4169E1" opacity="0.6"/>
  <!-- Letter overlay -->
  <text x="100" y="185" text-anchor="middle" font-family="Georgia, serif" font-size="16" fill="#DAA520" font-weight="bold" opacity="0.4">LOBO</text>
</svg>