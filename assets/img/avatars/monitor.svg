<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#111"/>
    </linearGradient>
  </defs>
  <!-- Background - flat black -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Subtle green glow -->
  <circle cx="100" cy="100" r="92" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.2"/>
  <!-- Bat wings - small, folded -->
  <path d="M48,55 Q30,30 20,45 Q25,50 30,48 Q28,55 35,52 Q33,60 42,55 L52,62" fill="#1a1a1a" stroke="#00ff41" stroke-width="0.5" opacity="0.6"/>
  <path d="M152,55 Q170,30 180,45 Q175,50 170,48 Q172,55 165,52 Q167,60 158,55 L148,62" fill="#1a1a1a" stroke="#00ff41" stroke-width="0.5" opacity="0.6"/>
  <!-- Head - small, compact -->
  <circle cx="100" cy="80" r="38" fill="#C4A07A"/>
  <!-- Short dark hair -->
  <path d="M64,72 Q72,48 100,44 Q128,48 136,72" fill="#111"/>
  <!-- Alert wide eyes - bat-like -->
  <ellipse cx="84" cy="78" rx="9" ry="8" fill="#111"/>
  <ellipse cx="116" cy="78" rx="9" ry="8" fill="#111"/>
  <circle cx="84" cy="78" r="4" fill="#00ff41"/>
  <circle cx="116" cy="78" r="4" fill="#00ff41"/>
  <circle cx="85" cy="77" r="1.5" fill="white"/>
  <circle cx="117" cy="77" r="1.5" fill="white"/>
  <!-- Green glow around eyes -->
  <ellipse cx="84" cy="78" rx="10" ry="9" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
  <ellipse cx="116" cy="78" rx="10" ry="9" fill="none" stroke="#00ff41" stroke-width="0.5" opacity="0.4"/>
  <!-- Sharp brows -->
  <line x1="73" y1="68" x2="92" y2="68" stroke="#111" stroke-width="2"/>
  <line x1="127" y1="68" x2="108" y2="68" stroke="#111" stroke-width="2"/>
  <!-- Small nose -->
  <path d="M98,84 L100,88 L102,84" fill="none" stroke="#a08060" stroke-width="1"/>
  <!-- Neutral alert expression -->
  <line x1="92" y1="96" x2="108" y2="96" stroke="#7a6050" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Dark tactical vest -->
  <path d="M58,120 Q78,110 100,112 Q122,110 142,120 L150,200 L50,200 Z" fill="#1a1a1a" stroke="#00ff41" stroke-width="0.5"/>
  <!-- Dashboard on wrist -->
  <rect x="130" y="125" width="24" height="16" rx="3" fill="#111" stroke="#00ff41" stroke-width="1"/>
  <!-- Dashboard elements -->
  <circle cx="136" cy="131" r="3" fill="none" stroke="#00ff41" stroke-width="0.8"/>
  <line x1="136" y1="131" x2="138" y2="129" stroke="#00ff41" stroke-width="0.8"/>
  <rect x="142" y="127" width="8" height="2" fill="#00ff41" opacity="0.6"/>
  <rect x="142" y="131" width="6" height="2" fill="#00ff41" opacity="0.4"/>
  <rect x="142" y="135" width="8" height="2" fill="#00ff41" opacity="0.6"/>
  <!-- Wrist/arm -->
  <path d="M142,120 L145,125 L150,120 Z" fill="#C4A07A"/>
  <!-- Perching feet hint at bottom -->
  <path d="M85,195 Q90,188 95,195" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <path d="M105,195 Q110,188 115,195" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
</svg>