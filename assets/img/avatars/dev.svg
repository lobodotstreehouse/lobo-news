<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
  </defs>
  <!-- Background - terminal black -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Terminal green glow ring -->
  <circle cx="100" cy="100" r="93" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>
  <!-- Head - stocky -->
  <circle cx="100" cy="82" r="45" fill="#C4A57B"/>
  <!-- Messy hair -->
  <path d="M58,72 Q65,38 100,35 Q135,38 142,72" fill="#3a2a1a"/>
  <path d="M70,45 Q75,35 85,42" fill="#3a2a1a"/>
  <path d="M115,40 Q125,33 130,45" fill="#3a2a1a"/>
  <!-- Eyes - focused coder -->
  <ellipse cx="82" cy="82" rx="8" ry="6" fill="#111" stroke="#00ff41" stroke-width="0.5"/>
  <ellipse cx="118" cy="82" rx="8" ry="6" fill="#111" stroke="#00ff41" stroke-width="0.5"/>
  <circle cx="83" cy="82" r="3" fill="#00ff41"/>
  <circle cx="119" cy="82" r="3" fill="#00ff41"/>
  <circle cx="84" cy="81" r="1" fill="white"/>
  <circle cx="120" cy="81" r="1" fill="white"/>
  <!-- Focused brows -->
  <line x1="72" y1="73" x2="91" y2="75" stroke="#3a2a1a" stroke-width="2.5"/>
  <line x1="128" y1="73" x2="109" y2="75" stroke="#3a2a1a" stroke-width="2.5"/>
  <!-- Nose -->
  <path d="M97,87 L100,94 L103,87" fill="none" stroke="#a08060" stroke-width="1.5"/>
  <!-- Slight grin -->
  <path d="M88,102 Q100,109 112,102" fill="none" stroke="#6a5040" stroke-width="1.5"/>
  <!-- T-shirt -->
  <path d="M52,132 Q72,115 100,118 Q128,115 148,132 L158,200 L42,200 Z" fill="#1a1a1a" stroke="#00ff41" stroke-width="0.5"/>
  <!-- Left hand - oil stained normal hand -->
  <circle cx="55" cy="140" r="9" fill="#C4A57B"/>
  <circle cx="55" cy="140" r="9" fill="#333" opacity="0.3"/>
  <!-- RIGHT ARM - CRAB CLAW - distinctive feature -->
  <path d="M148,130 L165,115 Q175,105 170,95 L160,100 Q165,108 158,115 L148,125" fill="#FF6B00" stroke="#CC5500" stroke-width="2"/>
  <path d="M148,130 L165,140 Q175,148 170,158 L160,150 Q165,142 158,138 L148,132" fill="#FF6B00" stroke="#CC5500" stroke-width="2"/>
  <!-- Claw highlight -->
  <path d="M155,115 L162,108" fill="none" stroke="#FFa040" stroke-width="1.5"/>
  <path d="M155,138 L162,145" fill="none" stroke="#FFa040" stroke-width="1.5"/>
  <!-- Phone with compiler error -->
  <rect x="48" y="148" width="16" height="26" rx="2" fill="#222" stroke="#00ff41" stroke-width="0.5"/>
  <text x="56" y="160" text-anchor="middle" font-family="monospace" font-size="4" fill="#ff0000">ERR</text>
  <text x="56" y="166" text-anchor="middle" font-family="monospace" font-size="3" fill="#00ff41">///</text>
  <!-- Terminal text floating -->
  <text x="30" y="25" font-family="monospace" font-size="8" fill="#00ff41" opacity="0.2">&gt;_</text>
  <text x="150" y="40" font-family="monospace" font-size="6" fill="#00ff41" opacity="0.15">sudo</text>
</svg>