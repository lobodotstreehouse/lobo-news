<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#808080"/>
      <stop offset="100%" style="stop-color:#4a4a4a"/>
    </linearGradient>
  </defs>
  <!-- Background - concrete grey -->
  <circle cx="100" cy="100" r="95" fill="url(#bg)"/>
  <!-- Badger ears - rounded, sturdy -->
  <ellipse cx="62" cy="32" rx="14" ry="18" fill="#555" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="138" cy="32" rx="14" ry="18" fill="#555" stroke="#333" stroke-width="1.5"/>
  <ellipse cx="62" cy="30" rx="8" ry="10" fill="#D2B48C" opacity="0.4"/>
  <ellipse cx="138" cy="30" rx="8" ry="10" fill="#D2B48C" opacity="0.4"/>
  <!-- Head - bear-built, broad -->
  <circle cx="100" cy="82" r="48" fill="#D2A67A"/>
  <!-- Badger stripe -->
  <path d="M90,38 Q100,35 110,38 L108,55 Q100,52 92,55 Z" fill="white" opacity="0.5"/>
  <!-- Thick hair/fur -->
  <path d="M55,78 Q60,38 100,32 Q140,38 145,78" fill="#4a3a2a"/>
  <!-- Strong dependable eyes -->
  <ellipse cx="82" cy="82" rx="8" ry="6" fill="white"/>
  <ellipse cx="118" cy="82" rx="8" ry="6" fill="white"/>
  <circle cx="83" cy="82" r="4" fill="#4a3a2a"/>
  <circle cx="119" cy="82" r="4" fill="#4a3a2a"/>
  <circle cx="84" cy="81" r="1.5" fill="white"/>
  <circle cx="120" cy="81" r="1.5" fill="white"/>
  <!-- Thick solid brows -->
  <line x1="72" y1="73" x2="92" y2="74" stroke="#4a3a2a" stroke-width="3"/>
  <line x1="128" y1="73" x2="108" y2="74" stroke="#4a3a2a" stroke-width="3"/>
  <!-- Broad nose -->
  <path d="M95,88 L100,96 L105,88" fill="none" stroke="#a08060" stroke-width="2"/>
  <!-- Steady, reliable expression -->
  <path d="M88,104 Q100,110 112,104" fill="none" stroke="#6a5040" stroke-width="2"/>
  <!-- Heavy work shirt - safety orange accents -->
  <path d="M45,135 Q70,115 100,120 Q130,115 155,135 L165,200 L35,200 Z" fill="#555"/>
  <!-- Safety orange vest stripes -->
  <line x1="60" y1="140" x2="60" y2="200" stroke="#FF6600" stroke-width="4"/>
  <line x1="140" y1="140" x2="140" y2="200" stroke="#FF6600" stroke-width="4"/>
  <!-- Caution yellow reflective strips -->
  <line x1="55" y1="160" x2="145" y2="160" stroke="#FFD700" stroke-width="2"/>
  <line x1="55" y1="180" x2="145" y2="180" stroke="#FFD700" stroke-width="2"/>
  <!-- Blueprint in hand -->
  <rect x="135" y="140" width="25" height="20" rx="1" fill="#E8E8FF" stroke="#4169E1" stroke-width="1" transform="rotate(-10 147 150)"/>
  <!-- Blueprint lines -->
  <line x1="139" y1="146" x2="155" y2="144" stroke="#4169E1" stroke-width="0.5" opacity="0.6"/>
  <line x1="139" y1="150" x2="155" y2="148" stroke="#4169E1" stroke-width="0.5" opacity="0.6"/>
  <rect x="142" y="152" width="8" height="5" fill="none" stroke="#4169E1" stroke-width="0.5" opacity="0.4"/>
  <!-- Large sturdy hand -->
  <circle cx="145" cy="138" r="10" fill="#D2A67A"/>
</svg>